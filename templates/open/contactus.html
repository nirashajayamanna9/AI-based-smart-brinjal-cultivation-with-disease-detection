<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Brinjal Hub</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <style>
         *{
            margin: 0;
            /* padding: 0; */
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }
        /* HEADER (Copied from index.html) */
        /* HEADER */
        header {
            width: 100%;
            padding: 18px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            position: fixed;
            top: 0;
            z-index: 999;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 40px;
        }

        nav a {
            margin-left: 30px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: 0.3s ease;
        }

        nav a.active,
        nav a:hover {
            color: #4CAF50;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 5px;
        }

        /* HERO */
        .hero {
            margin-top: 40px;
            
            height: 80x;
            padding: 34px 5px;
            text-align: center;
            background: linear-gradient(120deg, #4CAF50, #2f7336);
            color: white;
        }

        /* MAIN */
        .main-content {
            margin: 10px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            padding: 20px;
        }

        .contact-form-section,
        .contact-info-section {
            background: rgb(208, 240, 228);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .contact-form-section h2 { color: #2f7336; }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* NEW BUTTON COLOR */
        button {
            background: #1b5e20;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            background: #43a047;
        }
        /* CONTACT INFO */
        .contact-info-section{
           margin-bottom: 2px; 
        }
        .contact-info-section h3 {
            font-size: 26px;
            color: #2e6d37;
            margin-bottom: 2px;
        }

        .contact-info-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #f2f8f2;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #2e6d37;
        }

        .contact-icon {
            font-size: 30px;
        }
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            nav a {
                margin-left: 15px;
            }

            .hero-content h1 {
                font-size: 42px;
            }

            .description {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        
        <h2>🌱 BRINJAL HUB</h2>
    </div>

    <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('about') }}">About Us</a>
        <a href="{{ url_for('contactus') }}" class="active">Contact Us</a>
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('signup') }}">Sign Up</a>
    </nav>
</header>

<div class="hero">
    <h1>Get in Touch</h1>
    <p>Have questions? We'd love to hear from you</p>
</div>

<div class="main-content">

    <div class="contact-form-section">
        <h2>Send Us a Message</h2>
        <form>
            <input type="text" placeholder="Your Name *" required>
            <input type="email" placeholder="Email Address *" required>
            <select required>
                <option value="">Select Subject</option>
                <option value="general">General Inquiry</option>
                <option value="technical">Technical Support</option>
                <option value="feedback">Feedback</option>
            </select>
            <textarea placeholder="Your Message *" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <!-- CONTACT INFORMATION -->
        <div class="contact-info-section">
            <h3>Contact Information</h3>

            <div class="contact-info-item">
                <div class="contact-icon">📧</div>
                <div>
                    <h4>Email</h4>
                    <p>support@brinjalhub.com</p>
                </div>
            </div>

            <div class="contact-info-item">
                <div class="contact-icon">📱</div>
                <div>
                    <h4>Phone</h4>
                    <p>+94 71 356 7892</p>
                </div>
            </div>

            <div class="contact-info-item">
                <div class="contact-icon">📍</div>
                <div>
                    <h4>Location</h4>
                    <p>Kurunegala, Sri Lanka</p>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
