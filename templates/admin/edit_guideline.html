<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Growing Guideline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a href="/adminguideline" class="navbar-brand">← Back to Guideline Management</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0">Edit Growing Guideline</h4>
        </div>

        <div class="card-body">
            <!-- POST to the same URL -->
            <form method="POST">

                <!-- Climate -->
            <label class="form-label">Climate</label>
            <select name="climate_type" class="form-control mb-3" required>
                <option value="Dry" {% if guideline.climate_type == "Dry" %}selected{% endif %}>Dry</option>
                <option value="Wet" {% if guideline.climate_type == "Wet" %}selected{% endif %}>Wet</option>
            </select>

            <!-- Farm Size -->
            <label class="form-label">Farm Size</label>
            <select name="cultivation_size" class="form-control mb-3" required>
                <option value="Small" {% if guideline.cultivation_size == "Small" %}selected{% endif %}>Small</option>
                <option value="Medium" {% if guideline.cultivation_size == "Medium" %}selected{% endif %}>Medium</option>
            </select>


                <!-- Activity -->
                <label class="form-label">Activity</label>
                <input type="text"
                       name="activity"
                       class="form-control mb-3"
                       value="{{ guideline.activity }}"
                       required>

                <!-- Notes -->
                <label class="form-label">Notes</label>
                <textarea name="notes"
                          class="form-control mb-3"
                          rows="4">{{ guideline.notes }}</textarea>

                <!-- Image URL -->
                <label class="form-label">Image URL</label>
                <input type="text"
                       name="image_url"
                       class="form-control mb-3"
                       value="{{ guideline.image_url }}">

                <!-- Buttons -->
                <div class="d-flex justify-content-between">
                    <a href="/adminguideline" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-warning">Update Guideline</button>
                </div>

            </form>
        </div>
    </div>

</div>

</body>
</html>
