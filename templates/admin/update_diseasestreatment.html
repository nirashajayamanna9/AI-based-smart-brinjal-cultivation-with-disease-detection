<!DOCTYPE html>
<html>
<head>
    <title>Edit Disease Treatment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h4>Edit Disease Treatment</h4>

        <form method="POST" action="{{ url_for('update_treatment', disease_id=disease.disease_id) }}">
            <div class="mb-3">
                <label>Disease Name</label>
                <input type="text" class="form-control" value="{{ disease.disease }}" readonly>
                <input type="hidden" name="disease" value="{{ disease.disease }}">
            </div>

            <div class="mb-3">
                <label>Treatment</label>
                <textarea name="treatment" class="form-control" rows="4">{{ disease.treatment }}</textarea>
            </div>

            <div class="mb-3">
                <label>Prevention Tips</label>
                <textarea name="prevention_tips" class="form-control" rows="4">{{ disease.prevention_tips }}</textarea>
            </div>

            <button type="submit" class="btn btn-success">Update Treatment</button>
            <a href="{{ url_for('database') }}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>

</body>
</html>
