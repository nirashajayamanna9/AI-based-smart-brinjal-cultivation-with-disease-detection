<!DOCTYPE html>
<html>
<head>
    <title>Edit Weather Guideline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h3 class="text-warning">Edit Weather Guideline</h3>

    <form method="POST" action="/update_weatherguideline/{{ guideline.id }}">

        <!-- Temperature Range -->
        <label>Temperature Range (°C)</label>
        <div class="row mb-2">
            <div class="col">
                <input type="number" step="0.1" name="min_temp" class="form-control"
                       value="{{ guideline.min_temp }}" placeholder="Min Temp" required>
            </div>
            <div class="col">
                <input type="number" step="0.1" name="max_temp" class="form-control"
                       value="{{ guideline.max_temp }}" placeholder="Max Temp" required>
            </div>
        </div>

        <!-- Humidity Range -->
        <label>Humidity Range (%)</label>
        <div class="row mb-2">
            <div class="col">
                <input type="number" step="0.1" name="min_humidity" class="form-control"
                       value="{{ guideline.min_humidity }}" placeholder="Min Humidity" required>
            </div>
            <div class="col">
                <input type="number" step="0.1" name="max_humidity" class="form-control"
                       value="{{ guideline.max_humidity }}" placeholder="Max Humidity" required>
            </div>
        </div>

        <!-- Watering -->
        <label class="mt-2">Watering Guidelines</label>
        <textarea name="watering" class="form-control" required>{{ guideline.watering }}</textarea>

        <!-- Fertilization -->
        <label class="mt-2">Fertilization Guidelines</label>
        <textarea name="fertilization" class="form-control" required>{{ guideline.fertilization }}</textarea>

        <!-- General Care -->
        <label class="mt-2">General Care Guidelines</label>
        <textarea name="general_care" class="form-control" required>{{ guideline.general_care }}</textarea>

        <button class="btn btn-primary mt-3">Update Guideline</button>
        <a href="/admin/admin_weather_guidelines" class="btn btn-secondary mt-3">Cancel</a>
    </form>
</div>

</body>
</html>
